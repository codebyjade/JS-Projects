<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --cream: #f5f0e8;
    --espresso: #2c1810;
    --latte: #c4956a;
    --foam: #faf7f2;
    --steam: #e8ddd0;
    --accent: #8b4513;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--espresso);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--espresso);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 4px 20px rgba(44,24,16,0.3);
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--latte);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  .logo span { color: var(--cream); font-style: italic; }

  .search-bar {
    flex: 1;
    display: flex;
    gap: 10px;
    max-width: 600px;
  }

  .search-bar input {
    flex: 1;
    padding: 10px 18px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.12);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: background 0.2s;
  }

  .search-bar input::placeholder { color: rgba(245,240,232,0.5); }
  .search-bar input:focus { background: rgba(255,255,255,0.2); }

  .search-bar button {
    padding: 10px 22px;
    background: var(--latte);
    color: var(--espresso);
    border: none;
    border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .search-bar button:hover { background: #d4a57a; transform: translateY(-1px); }

  .nearby-btn {
    padding: 10px 18px;
    background: transparent;
    color: var(--latte);
    border: 1px solid var(--latte);
    border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nearby-btn:hover { background: var(--latte); color: var(--espresso); }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 360px;
    background: var(--foam);
    overflow-y: auto;
    border-right: 1px solid var(--steam);
    flex-shrink: 0;
  }

  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: var(--foam); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--steam); border-radius: 3px; }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--steam);
    position: sticky;
    top: 0;
    background: var(--foam);
    z-index: 5;
  }

  .sidebar-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--espresso);
  }

  .sidebar-header p { font-size: 0.8rem; color: var(--latte); margin-top: 2px; }

  .cafe-list { padding: 12px; }

  .cafe-card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    box-shadow: 0 2px 8px rgba(44,24,16,0.06);
  }

  .cafe-card:hover { border-color: var(--latte); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(44,24,16,0.12); }
  .cafe-card.active { border-color: var(--accent); background: #fff9f5; }

  .cafe-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }

  .cafe-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--espresso);
    line-height: 1.3;
  }

  .cafe-rating {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }

  .cafe-address { font-size: 0.78rem; color: #888; margin-top: 6px; line-height: 1.4; }

  .cafe-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

  .tag {
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--steam);
    color: var(--espresso);
    font-weight: 500;
  }

  .tag.open { background: #e8f5e9; color: #2e7d32; }
  .tag.closed { background: #ffebee; color: #c62828; }

  .distance { font-size: 0.75rem; color: var(--latte); margin-top: 8px; font-weight: 500; }

  #map { flex: 1; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #aaa;
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  .api-notice {
    background: linear-gradient(135deg, var(--espresso), #4a2c1a);
    color: var(--cream);
    padding: 14px 20px;
    font-size: 0.82rem;
    line-height: 1.6;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .api-notice strong { color: var(--latte); }
  .api-notice code {
    background: rgba(255,255,255,0.12);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.78rem;
  }

  .loading {
    text-align: center;
    padding: 30px;
    color: var(--latte);
    font-style: italic;
  }

  /* Demo cafes for when no API key */
  .demo-banner {
    background: var(--latte);
    color: var(--espresso);
    text-align: center;
    padding: 8px;
    font-size: 0.8rem;
    font-weight: 500;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="demo-banner">☕ Demo Mode — Add your Google Maps API key to enable live search</div>

<header>
  <div class="logo">café<span>finder</span></div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by city or neighborhood…" value="New York, NY">
    <button onclick="searchCafes()">Search</button>
    <button class="nearby-btn" onclick="findNearby()">📍 Near Me</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="api-notice">
      <strong>🔑 Setup:</strong> Replace <code>YOUR_API_KEY</code> in the script tag below with your 
      <strong>Google Maps API key</strong> (enable Maps JS API + Places API in Google Cloud Console).
    </div>
    <div class="sidebar-header">
      <h2>Nearby Cafés</h2>
      <p id="resultCount">Showing demo results</p>
    </div>
    <div class="cafe-list" id="cafeList">
      <!-- Demo cards rendered by JS -->
    </div>
  </div>
  <div id="map"></div>
</div>

<!-- 🔑 REPLACE YOUR_API_KEY BELOW -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initMap" async defer onerror="initDemoMode()"></script>

<script>
  const GOOGLE_API_KEY = 'YOUR_API_KEY';
  let map, service, markers = [], infoWindow;
  let demoMode = false;

  const demoCafes = [
    { name: "Blue Bottle Coffee", address: "450 W 15th St, New York, NY", rating: 4.6, distance: "0.2 mi", open: true, types: ["Specialty", "Espresso"], lat: 40.7432, lng: -74.0051 },
    { name: "Gregorys Coffee", address: "874 6th Ave, New York, NY", rating: 4.4, distance: "0.4 mi", open: true, types: ["WiFi", "Cozy"], lat: 40.7484, lng: -73.9967 },
    { name: "Blank Street Coffee", address: "2 W 23rd St, New York, NY", rating: 4.5, distance: "0.6 mi", open: false, types: ["Quick", "Matcha"], lat: 40.7442, lng: -73.9893 },
    { name: "Joe Coffee Company", address: "131 W 21st St, New York, NY", rating: 4.7, distance: "0.7 mi", open: true, types: ["Beans", "Community"], lat: 40.7418, lng: -73.9982 },
    { name: "La Colombe Torrefaction", address: "319 Church St, New York, NY", rating: 4.5, distance: "1.1 mi", open: true, types: ["Draft Latte", "Roastery"], lat: 40.7195, lng: -74.0028 },
    { name: "Irving Farm Coffee", address: "88 Orchard St, New York, NY", rating: 4.3, distance: "1.4 mi", open: false, types: ["Farm-to-Cup", "Brunch"], lat: 40.7175, lng: -73.9893 },
  ];

  function initDemoMode() {
    demoMode = true;
    renderDemoMap();
    renderCafeList(demoCafes);
  }

  function renderDemoMap() {
    const mapEl = document.getElementById('map');
    mapEl.style.background = 'linear-gradient(135deg, #e8ddd0 0%, #f5f0e8 50%, #d4c4b0 100%)';
    mapEl.style.display = 'flex';
    mapEl.style.alignItems = 'center';
    mapEl.style.justifyContent = 'center';
    mapEl.style.flexDirection = 'column';
    mapEl.style.gap = '12px';
    mapEl.innerHTML = `
      <div style="font-size:4rem">🗺️</div>
      <div style="font-family:'Playfair Display',serif;font-size:1.4rem;color:#2c1810">Google Map Goes Here</div>
      <div style="font-size:0.85rem;color:#8b4513;max-width:300px;text-align:center;line-height:1.6">
        Add your Google Maps API key to the script src URL to see an interactive map with café markers
      </div>
    `;
  }

  function initMap() {
    const center = { lat: 40.7432, lng: -74.0051 };
    map = new google.maps.Map(document.getElementById('map'), {
      center,
      zoom: 14,
      styles: [
        { featureType: "all", elementType: "geometry", stylers: [{ color: "#f5f0e8" }] },
        { featureType: "water", elementType: "geometry", stylers: [{ color: "#c4d8e8" }] },
        { featureType: "road", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
        { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#e8ddd0" }] },
        { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#d4e8d4" }] },
        { featureType: "all", elementType: "labels.text.fill", stylers: [{ color: "#2c1810" }] },
      ]
    });
    infoWindow = new google.maps.InfoWindow();
    service = new google.maps.places.PlacesService(map);
    searchCafes();
  }

  function searchCafes() {
    if (demoMode) { renderCafeList(demoCafes); return; }
    if (!map) return;

    const query = document.getElementById('searchInput').value;
    const geocoder = new google.maps.Geocoder();
    geocoder.geocode({ address: query }, (results, status) => {
      if (status === 'OK') {
        const loc = results[0].geometry.location;
        map.setCenter(loc);
        doNearbySearch(loc);
      }
    });
  }

  function findNearby() {
    if (demoMode) { renderCafeList(demoCafes); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      map.setCenter(loc);
      map.setZoom(15);
      doNearbySearch(loc);
    });
  }

  function doNearbySearch(location) {
    clearMarkers();
    document.getElementById('cafeList').innerHTML = '<div class="loading">Brewing results… ☕</div>';
    service.nearbySearch({
      location,
      radius: 1500,
      type: ['cafe'],
      keyword: 'coffee cafe'
    }, (results, status) => {
      if (status === google.maps.places.PlacesServiceStatus.OK) {
        document.getElementById('resultCount').textContent = `${results.length} cafés found`;
        renderCafeList(results.map(p => ({
          name: p.name,
          address: p.vicinity,
          rating: p.rating,
          open: p.opening_hours?.isOpen(),
          lat: p.geometry.location.lat(),
          lng: p.geometry.location.lng(),
          types: p.types?.slice(0,2).map(t => t.replace(/_/g,' ')) || [],
          placeId: p.place_id
        })));
      }
    });
  }

  function renderCafeList(cafes) {
    const list = document.getElementById('cafeList');
    if (!demoMode) document.getElementById('resultCount').textContent = `${cafes.length} cafés found`;
    list.innerHTML = cafes.map((c, i) => `
      <div class="cafe-card" id="card-${i}" onclick="selectCafe(${i})">
        <div class="cafe-card-top">
          <div class="cafe-name">${c.name}</div>
          ${c.rating ? `<div class="cafe-rating">⭐ ${c.rating}</div>` : ''}
        </div>
        <div class="cafe-address">📍 ${c.address}</div>
        ${c.distance ? `<div class="distance">🚶 ${c.distance} away</div>` : ''}
        <div class="cafe-tags">
          ${c.open !== undefined ? `<span class="tag ${c.open ? 'open' : 'closed'}">${c.open ? '✓ Open' : '✗ Closed'}</span>` : ''}
          ${(c.types||[]).slice(0,2).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    `).join('');

    if (!demoMode) addMarkers(cafes);
  }

  function addMarkers(cafes) {
    cafes.forEach((c, i) => {
      const marker = new google.maps.Marker({
        position: { lat: c.lat, lng: c.lng },
        map,
        title: c.name,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: '#c4956a',
          fillOpacity: 1,
          strokeColor: '#2c1810',
          strokeWeight: 2,
          scale: 10
        }
      });
      marker.addListener('click', () => selectCafe(i));
      markers.push(marker);
    });
  }

  function selectCafe(i) {
    document.querySelectorAll('.cafe-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${i}`)?.classList.add('active');
    document.getElementById(`card-${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    if (!demoMode && markers[i]) {
      map.panTo(markers[i].getPosition());
      map.setZoom(16);
    }
  }

  function clearMarkers() { markers.forEach(m => m.setMap(null)); markers = []; }

  // Init demo if API key not set
  window.addEventListener('load', () => {
    setTimeout(() => {
      if (!window.google) initDemoMode();
    }, 2000);
  });
</script>
</body>
</html>
